<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firma de consentimiento — NERV-IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #0891B2; --green-dark: #0E7490;
      --bg: #F0F9FF; --text: #0F172A; --muted: #6b7280;
      --border: #e5e7eb; --radius: 12px;
    }
    body { font-family: 'Space Grotesk', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 24px 16px 48px; }
    .logo { font-weight: 800; font-size: 22px; letter-spacing: -2px; color: #0F172A; margin-bottom: 28px; margin-top: 8px; }
    .logo span { color: #0891B2; }
    .card { background: #fff; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 32px 28px; width: 100%; max-width: 600px; }
    .card-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
    .card-clinic { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
    .doc-body { background: var(--bg); border-radius: 10px; padding: 20px; font-size: 14px; line-height: 1.7; white-space: pre-wrap; max-height: 320px; overflow-y: auto; border: 1px solid var(--border); margin-bottom: 24px; }
    .sign-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 8px; }
    .sign-input { width: 100%; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: 10px; font-size: 15px; font-family: inherit; outline: none; transition: border-color .15s; margin-bottom: 14px; }
    .sign-input:focus { border-color: var(--green); }
    .sign-check { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--text); margin-bottom: 24px; cursor: pointer; }
    .sign-check input { width: 18px; height: 18px; accent-color: var(--green); flex-shrink: 0; margin-top: 1px; cursor: pointer; }
    .sign-btn { width: 100%; padding: 14px; background: var(--green); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s; }
    .sign-btn:hover { background: var(--green-dark); }
    .sign-btn:disabled { background: #94a3b8; cursor: not-allowed; }
    .success-screen { display: none; flex-direction: column; align-items: center; text-align: center; padding: 20px 0; }
    .success-icon { font-size: 60px; margin-bottom: 16px; }
    .success-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
    .success-sub { font-size: 14px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .wa-reply-btn { display: inline-flex; align-items: center; gap: 8px; padding: 12px 22px; background: #25d366; color: #fff; border: none; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: inherit; text-decoration: none; }
    .footer { font-size: 11px; color: var(--muted); margin-top: 24px; text-align: center; }
    @media (max-width: 480px) { .card { padding: 24px 18px; } }
  </style>
</head>
<body>

<div class="logo">NERV<span>-IA</span></div>

<div class="card" id="sign-card">
  <div class="card-title" id="doc-title">Cargando documento…</div>
  <div class="card-clinic" id="doc-clinic"></div>
  <div class="doc-body" id="doc-body"></div>

  <div class="sign-label" id="sign-label-1">Tu nombre completo (firma)</div>
  <input type="text" class="sign-input" id="sign-name" placeholder="Escribe tu nombre y apellidos" oninput="validateForm()">

  <div id="minor-section" style="display:none;">
    <div class="sign-label">Nombre del segundo progenitor / tutor (firma)</div>
    <input type="text" class="sign-input" id="sign-name-2" placeholder="Nombre y apellidos del segundo firmante" oninput="validateForm()">
  </div>

  <div style="margin-bottom:20px; display:flex; flex-direction:column; gap:12px;">
    <label class="sign-check" style="margin-bottom:0;">
      <input type="checkbox" id="check-wa">
      Acepto que el centro me contacte por WhatsApp para gestiones relacionadas con mi tratamiento.
    </label>
    <label class="sign-check" style="margin-bottom:0;">
      <input type="checkbox" id="check-audio">
      Acepto la grabación de audio de las sesiones para uso exclusivamente interno y de mejora de la calidad.
    </label>
  </div>

  <label class="sign-check">
    <input type="checkbox" id="sign-check" onchange="validateForm()">
    He leído el documento completo y acepto su contenido de forma voluntaria e informada.
  </label>

  <button class="sign-btn" id="sign-btn" onclick="doSign()" disabled>✍️ Firmar consentimiento</button>

  <div class="success-screen" id="success-screen">
    <div class="success-icon">✅</div>
    <div class="success-title">Consentimiento firmado</div>
    <div class="success-sub" id="success-msg"></div>
    <a class="wa-reply-btn" id="wa-reply-link" href="#" target="_blank">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
      Enviar confirmación al centro
    </a>
  </div>
</div>

<div class="footer">Documento gestionado con NERV-IA · Los datos se mantienen en tu dispositivo</div>

<script>
  const params  = new URLSearchParams(window.location.search);
  const title   = params.get('t')    ? decodeURIComponent(escape(atob(decodeURIComponent(params.get('t'))))) : 'Sin título';
  const content = params.get('c')    ? decodeURIComponent(escape(atob(decodeURIComponent(params.get('c'))))) : '';
  const patient = params.get('n')    ? decodeURIComponent(params.get('n')) : '';
  const clinic  = params.get('clinic')? decodeURIComponent(params.get('clinic')) : 'el centro';
  const clinicWa = params.get('wa')  ? decodeURIComponent(params.get('wa')).replace(/\s/g,'') : '';
  const isMinor  = params.get('minor') === '1';

  if (isMinor) {
    document.getElementById('minor-section').style.display = 'block';
    document.getElementById('sign-label-1').textContent = 'Nombre del primer progenitor / tutor (firma)';
  }

  document.getElementById('doc-title').textContent  = title;
  document.getElementById('doc-clinic').textContent = `Enviado por: ${clinic}`;
  // Content may be HTML (rich editor) or plain text
  const docBody = document.getElementById('doc-body');
  if (content && /<[a-z][\s\S]*>/i.test(content)) {
    docBody.innerHTML = content || '(Sin contenido)';
  } else {
    docBody.textContent = content || '(Sin contenido)';
  }

  if (patient) document.getElementById('sign-name').value = patient;

  function validateForm() {
    let ok = document.getElementById('sign-name').value.trim().length > 1
            && document.getElementById('sign-check').checked;

    if (isMinor) {
      ok = ok && document.getElementById('sign-name-2').value.trim().length > 1;
    }

    document.getElementById('sign-btn').disabled = !ok;
  }

  function doSign() {
    const name = document.getElementById('sign-name').value.trim();
    const name2 = isMinor ? document.getElementById('sign-name-2').value.trim() : '';
    const waOk = document.getElementById('check-wa').checked;
    const audioOk = document.getElementById('check-audio').checked;
    const now  = new Date().toLocaleString('es-ES');

    // Hide form, show success
    document.getElementById('sign-btn').style.display  = 'none';
    document.getElementById('sign-check').closest('label').style.display = 'none';
    document.querySelectorAll('.sign-label').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.sign-input').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.sign-check').forEach(el => el.style.display = 'none');

    const successScreen = document.getElementById('success-screen');
    successScreen.style.display = 'flex';

    let signers = name;
    if (isMinor) signers += ` y ${name2}`;

    let choices = `\n✅ WhatsApp: ${waOk?'SÍ':'NO'}\n✅ Grabación: ${audioOk?'SÍ':'NO'}`;

    document.getElementById('success-msg').textContent =
      `${signers} han firmado "${title}" el ${now}.${choices}\nPuedes enviar la confirmación al centro con el botón de abajo.`;

    // WhatsApp reply to clinic
    const replyMsg = `Hola 👋 Soy *${signers}*.\nHe firmado el consentimiento:\n📄 *${title}*\nFecha: ${now}${choices}`;
    const waLink = document.getElementById('wa-reply-link');
    if (clinicWa && clinicWa.length >= 9) {
      const phone = clinicWa.startsWith('+') ? clinicWa.slice(1) : clinicWa;
      waLink.href = `https://wa.me/${phone}?text=${encodeURIComponent(replyMsg)}`;
    } else {
      waLink.style.display = 'none';
    }
  }
</script>
</body>
</html>
